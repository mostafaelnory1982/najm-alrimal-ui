<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Najm Al-Rimal - American Auto Parts" />
  <title>Najm Al-Rimal | Design System</title>

  <script>
    (function () {
      const t = localStorage.getItem('najm-theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-grid.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-utilities.min.css" rel="stylesheet">

  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body class="min-h-screen bg-surface">

  <header class="sticky-top border-bottom bg-surface-blur py-3">
    <div class="container">
      <nav class="d-flex align-items-center justify-content-between" role="navigation">
        
        <a href="/" class="d-flex align-items-center gap-2 text-decoration-none">
          <div class="logo-box bg-brand text-on-brand">ن</div>
          <span class="text-heading-md font-bold text-on-surface">نجم الرمال</span>
        </a>

        <div class="d-flex align-items-center gap-3">
          <button id="lang-toggle" type="button" title="Toggle language" class="btn border px-3 py-1 text-sm font-medium">EN</button>
          
          <button id="theme-toggle" type="button" title="Toggle theme" class="btn border p-2 rounded-circle d-flex align-items-center justify-content-center">
            <svg class="dark-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <svg class="dark-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            </svg>
          </button>
        </div>

      </nav>
    </div>
  </header>

  <main>
    
    <section class="py-5 bg-surface-container">
      <div class="container text-center">
        <h1 class="text-display-xl text-brand mb-3">قطع غيار سيارات أمريكية</h1>
        <p class="text-body-lg text-muted max-w-lg mx-auto mb-4">
          نظام التصميم المتكامل لمتجر نجم الرمال - تجربة تسوق فريدة لقطع الغيار الأصلية.
        </p>
        <div class="d-flex justify-content-center gap-3">
          <button class="btn-brand">تسوق الآن</button>
          <button class="btn border px-4 py-2 font-semibold">المزيد</button>
        </div>
      </div>
    </section>

    <section class="py-5">
      <div class="container">
        <h2 class="text-heading-xl mb-4">اختبار النظام (DGA Tokens)</h2>
        <div class="row g-4">
          <div class="col-6 col-md-3">
            <div class="p-4 rounded-lg bg-brand text-on-brand text-center">Brand Color</div>
          </div>
          <div class="col-6 col-md-3">
            <div class="p-4 rounded-lg bg-brand-cont text-brand text-center">Brand Container</div>
          </div>
          <div class="col-6 col-md-3">
            <div class="p-4 rounded-lg border text-on-surface text-center">Outline Variant</div>
          </div>
          <div class="col-6 col-md-3">
            <div class="p-4 rounded-lg bg-surface-cont text-on-surface text-center">Surface Container</div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="py-4 border-top text-center text-muted">
    <div class="container">
      <p class="text-caption">نجم الرمال © ٢٠٢٦ — جميع الحقوق محفوظة</p>
    </div>
  </footer>

  <script src="./js/script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجم الرمال - قطع غيار أصلية</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">

<link rel="stylesheet" href="CSS/styles.css">
</head>
<body>

    <header class="main-header sticky-top bg-white border-bottom">
        <nav class="container d-flex align-items-center justify-content-between py-3">
            <div class="logo">
                <img src="assets/brand/Logo.svg" alt="نجم الرمال" width="130">
            </div>
            
            <div class="header-actions d-flex align-items-center gap-3">
                <a href="account.html" class="btn btn-ghost btn-icon-only" aria-label="حسابي">
                    <i class="icon icon-user"></i>
                </a>
                <button class="btn btn-primary d-flex align-items-center gap-2">
                    <i class="icon icon-cart"></i>
                    <span>السلة</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero-section" class="hero-section py-5 position-relative" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('assets/images/hero-bg.jpg') center/cover;">
            <div class="container text-center py-5 text-white">
                <h1 class="display-5 fw-bold mb-4">اقطع غيار أصلية، توصيل سريع في جميع أنحاء المملكة العربية السعودية</h1>
                
                <div class="filter-bar bg-white p-4 rounded-4 shadow-lg d-flex flex-wrap gap-4 justify-content-center mt-5">
                    
                    <div class="input-field-group text-start">
                        <label class="form-label text-dark fw-semibold mb-2">بحث سريع</label>
                        <div class="input-container position-relative">
                            <i class="icon icon-search position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary"></i>
                            <input type="text" class="form-control ps-5" placeholder="رقم القطعة...">
                        </div>
                    </div>

                    <div class="input-field-group text-start">
                        <label class="form-label text-dark fw-semibold mb-2">اختر الماركة</label>
                        <div class="input-container position-relative">
                            <i class="icon icon-car position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary"></i>
                            <select class="form-select ps-5" aria-label="اختر الماركة">
                                <option selected disabled>الماركة</option>
                                <option>تويوتا</option>
                                <option>نيسان</option>
                            </select>
                        </div>
                    </div>

                    <div class="align-self-end">
                        <button class="btn btn-primary px-5 py-2">بحث الآن</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="trust-badges" class="py-5 bg-light">
            <div class="container">
                <div class="row g-4 text-center">
                    <div class="col-md-3">
                        <div class="badge-item">
                            <i class="icon icon-truck fs-2 text-primary mb-2"></i>
                            <h6 class="fw-bold mb-0">شحن لكل المدن</h6>
